services:
  # 前端服务
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      args:
        SIQ_AUTH_COOKIE_MODE: ${SIQ_AUTH_COOKIE_MODE:-0}
        SIQ_MEETINGS_ENABLED: ${SIQ_MEETINGS_ENABLED:-0}
        SIQ_MEETING_IMPORT_ENABLED: ${SIQ_MEETING_IMPORT_ENABLED:-0}
        SIQ_MULTI_MARKET_RESEARCH_ENABLED: ${SIQ_MULTI_MARKET_RESEARCH_ENABLED:-0}
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_FRONTEND_PORT:-15173}:15173"
    environment:
      - NODE_ENV=production
      - SIQ_DEPLOYMENT_PROFILE=${SIQ_DEPLOYMENT_PROFILE:-local}
      - SIQ_BACKEND_URL=http://api:18081
      - SIQ_MEETING_STREAM_GATEWAY_URL=${SIQ_MEETING_STREAM_GATEWAY_URL:-http://api:18081}
      - SIQ_REPORT_FINDER_URL=http://report-finder:8000
      - SIQ_FRONTEND_PORT=15173
      - SIQ_AUTH_COOKIE_MODE=${SIQ_AUTH_COOKIE_MODE:-0}
      - VITE_SIQ_AUTH_COOKIE_MODE=${SIQ_AUTH_COOKIE_MODE:-0}
      - SIQ_MULTI_MARKET_RESEARCH_ENABLED=${SIQ_MULTI_MARKET_RESEARCH_ENABLED:-0}
    depends_on:
      - api
      - report-finder
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: ${SIQ_WEB_MEM_LIMIT:-768m}
    cpus: ${SIQ_WEB_CPUS:-1.0}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:15173/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # 聚合后端
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_BACKEND_PORT:-18081}:18081"
    environment:
      - SIQ_LOCAL_STATE_ROOT=/state
      - SIQ_DEPLOYMENT_PROFILE=${SIQ_DEPLOYMENT_PROFILE:-local}
      - SIQ_METRICS_TOKEN=${SIQ_METRICS_TOKEN:-}
      - SIQ_MULTI_MARKET_RESEARCH_ENABLED=${SIQ_MULTI_MARKET_RESEARCH_ENABLED:-0}
      - SIQ_US_SEC_ANALYSIS_ENABLED=${SIQ_US_SEC_ANALYSIS_ENABLED:-0}
      - SIQ_DATA_ROOT=/state/data
      - SIQ_RUNTIME_ROOT=/state/var
      - SIQ_ARTIFACTS_ROOT=/state/artifacts
      - SIQ_REPORT_REVIEW_ROOT=/state/artifacts
      - SIQ_REPORT_REVIEW_MAX_BYTES=${SIQ_REPORT_REVIEW_MAX_BYTES:-10485760}
      - SIQ_DATASETS_ROOT=/app/datasets
      - SIQ_WIKI_ROOT=/state/data/wiki
      - WIKI_ROOT=/state/data/wiki
      - SIQ_REPORT_DOWNLOADS_ROOT=/state/data/market-report-finder/downloads
      - REPORT_DOWNLOADS_ROOT=/state/data/market-report-finder/downloads
      - SIQ_DB_ROOT=/app/db
      - SIQ_APP_DATABASE_URL=postgresql+psycopg://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/siq_app
      - SIQ_BACKGROUND_JOB_BACKEND=${SIQ_BACKGROUND_JOB_BACKEND:-file}
      - SIQ_BACKGROUND_JOB_LEASE_SECONDS=${SIQ_BACKGROUND_JOB_LEASE_SECONDS:-120}
      - SIQ_DOCUMENT_PGDATABASE=siq_document_parser
      - SIQ_US_PGDATABASE=siq_us
      - SIQ_HK_PGDATABASE=siq_hk
      - SIQ_JP_PGDATABASE=siq_jp
      - SIQ_KR_PGDATABASE=siq_kr
      - SIQ_EU_PGDATABASE=siq_eu
      - REDIS_URL=redis://redis:6379/0
      - SIQ_AGENT_MEMORY_ENABLED=${SIQ_AGENT_MEMORY_ENABLED:-true}
      - SIQ_AGENT_MEMORY_WRITE_ENABLED=${SIQ_AGENT_MEMORY_WRITE_ENABLED:-true}
      - SIQ_AGENT_MEMORY_RETRIEVAL_ENABLED=${SIQ_AGENT_MEMORY_RETRIEVAL_ENABLED:-true}
      - SIQ_AGENT_MEMORY_VECTOR_BACKEND=${SIQ_AGENT_MEMORY_VECTOR_BACKEND:-milvus}
      - SIQ_AGENT_MEMORY_PGVECTOR_ENABLED=${SIQ_AGENT_MEMORY_PGVECTOR_ENABLED:-false}
      - SIQ_MILVUS_HOST=${SIQ_MILVUS_HOST:-host.docker.internal}
      - SIQ_MILVUS_PORT=${SIQ_MILVUS_PORT:-19530}
      - SIQ_MILVUS_COLLECTION=${SIQ_MILVUS_COLLECTION:-siq_deal_shared}
      - SIQ_AGENT_MEMORY_EXTRACTION_ENABLED=${SIQ_AGENT_MEMORY_EXTRACTION_ENABLED:-true}
      - SIQ_AGENT_MEMORY_SCHEMA=${SIQ_AGENT_MEMORY_SCHEMA:-agent_memory}
      - SIQ_AGENT_MEMORY_DEFAULT_VISIBILITY=${SIQ_AGENT_MEMORY_DEFAULT_VISIBILITY:-user_private}
      - SIQ_AGENT_MEMORY_PRIMARY_MARKET_VISIBILITY=${SIQ_AGENT_MEMORY_PRIMARY_MARKET_VISIBILITY:-project_shared}
      - SIQ_AGENT_MEMORY_MILVUS_COLLECTION=${SIQ_AGENT_MEMORY_MILVUS_COLLECTION:?SIQ_AGENT_MEMORY_MILVUS_COLLECTION is required}
      - SIQ_AGENT_MEMORY_EMBEDDING_DIM=${SIQ_AGENT_MEMORY_EMBEDDING_DIM:-1024}
      - SIQ_AGENT_MEMORY_EMBEDDING_BASE_URL=${SIQ_AGENT_MEMORY_EMBEDDING_BASE_URL:-http://host.docker.internal:8013}
      - SIQ_AGENT_MEMORY_EMBEDDING_MODEL=${SIQ_AGENT_MEMORY_EMBEDDING_MODEL:-Qwen3-VL-Embedding-2B}
      - SIQ_AGENT_MEMORY_RERANK_ENABLED=${SIQ_AGENT_MEMORY_RERANK_ENABLED:-true}
      - SIQ_AGENT_MEMORY_MAX_ITEMS=${SIQ_AGENT_MEMORY_MAX_ITEMS:-8}
      - SIQ_AGENT_MEMORY_FULL_RECALL_MAX_ITEMS=${SIQ_AGENT_MEMORY_FULL_RECALL_MAX_ITEMS:-25}
      - SIQ_AGENT_MEMORY_MAX_TOKENS=${SIQ_AGENT_MEMORY_MAX_TOKENS:-1800}
      - SIQ_AGENT_MEMORY_MIN_SCORE=${SIQ_AGENT_MEMORY_MIN_SCORE:-0.72}
      - SIQ_AGENT_MEMORY_RETRIEVAL_BUDGET_MS=${SIQ_AGENT_MEMORY_RETRIEVAL_BUDGET_MS:-1200}
      - SIQ_AGENT_MEMORY_RERANK_TIMEOUT=${SIQ_AGENT_MEMORY_RERANK_TIMEOUT:-1.0}
      - SIQ_AGENT_MEMORY_MIN_QUERY_CHARS=${SIQ_AGENT_MEMORY_MIN_QUERY_CHARS:-4}
      - SIQ_AGENT_MEMORY_TIME_DECAY_ENABLED=${SIQ_AGENT_MEMORY_TIME_DECAY_ENABLED:-true}
      - SIQ_AGENT_MEMORY_TIME_DECAY_HALF_LIFE_DAYS=${SIQ_AGENT_MEMORY_TIME_DECAY_HALF_LIFE_DAYS:-30}
      - SIQ_AGENT_MEMORY_TIME_DECAY_FLOOR=${SIQ_AGENT_MEMORY_TIME_DECAY_FLOOR:-0.35}
      - HERMES_API_KEY=${HERMES_API_KEY:-}
      - SIQ_HERMES_ASSISTANT_RUNS_URL=${SIQ_HERMES_ASSISTANT_RUNS_URL:-}
      - SIQ_HERMES_HOME=/state/var/hermes/home
      - SIQ_HERMES_PROFILES_ROOT=/state/var/hermes/home/profiles
      - SIQ_HERMES_HOST_HOME=${SIQ_HERMES_HOST_HOME:?SIQ_HERMES_HOST_HOME is required}
      - SIQ_IC_TASK_LEASE_SECONDS=${SIQ_IC_TASK_LEASE_SECONDS:-120}
      - SIQ_IC_TASK_HEARTBEAT_SECONDS=${SIQ_IC_TASK_HEARTBEAT_SECONDS:-30}
      - SIQ_IC_TASK_LEASE_BACKEND=${SIQ_IC_TASK_LEASE_BACKEND:-file}
      - NO_PROXY=${NO_PROXY:-127.0.0.1,localhost,host.docker.internal,postgres,redis,pdf-parser,document-parser,report-finder}
      - no_proxy=${no_proxy:-127.0.0.1,localhost,host.docker.internal,postgres,redis,pdf-parser,document-parser,report-finder}
      - SIQ_AUTH_SECRET_KEY=${SIQ_AUTH_SECRET_KEY:?SIQ_AUTH_SECRET_KEY is required}
      - SIQ_CORS_ALLOW_ORIGINS=${SIQ_CORS_ALLOW_ORIGINS:?SIQ_CORS_ALLOW_ORIGINS is required}
      - SIQ_RERANK_BASE_URL=${SIQ_RERANK_BASE_URL:-http://host.docker.internal:8001}
      - SIQ_RERANK_MODEL=${SIQ_RERANK_MODEL:-Qwen3-VL-Reranker-2B}
      - SIQ_AUTH_COOKIE_MODE=${SIQ_AUTH_COOKIE_MODE:-0}
      - SIQ_AUTH_COOKIE_SECURE=${SIQ_AUTH_COOKIE_SECURE:-0}
      - SIQ_AUTH_COOKIE_SAMESITE=${SIQ_AUTH_COOKIE_SAMESITE:-lax}
      - SIQ_SOURCE_TOKEN_SECRET=${SIQ_SOURCE_TOKEN_SECRET:-}
      - SIQ_SOURCE_ACCEPT_LEGACY_AUTH_SECRET=${SIQ_SOURCE_ACCEPT_LEGACY_AUTH_SECRET:-0}
      - SIQ_ALLOW_REGISTRATION=${SIQ_ALLOW_REGISTRATION:-0}
      - SIQ_DEMO_MODE=${SIQ_DEMO_MODE:-0}
      - SIQ_PDF2MD_API_BASE=http://pdf-parser:15000
      - PDF2MD_API_BASE=http://pdf-parser:15000
      - SIQ_DOCUMENT_PARSER_API_BASE=http://document-parser:15010
      - SIQ_DOCUMENT_PARSER_ACCESS_TOKEN=${SIQ_DOCUMENT_PARSER_ACCESS_TOKEN:?SIQ_DOCUMENT_PARSER_ACCESS_TOKEN is required}
      - SIQ_PRIMARY_MARKET_DOCUMENT_ARTIFACT_TRANSPORT=${SIQ_PRIMARY_MARKET_DOCUMENT_ARTIFACT_TRANSPORT:-api}
      - SIQ_PRIMARY_MARKET_DOCUMENT_ARTIFACT_MAX_FILE_BYTES=${SIQ_PRIMARY_MARKET_DOCUMENT_ARTIFACT_MAX_FILE_BYTES:-134217728}
      - SIQ_PRIMARY_MARKET_DOCUMENT_ARTIFACT_MAX_TOTAL_BYTES=${SIQ_PRIMARY_MARKET_DOCUMENT_ARTIFACT_MAX_TOTAL_BYTES:-536870912}
      - SIQ_PRIMARY_MARKET_DOCUMENT_ARTIFACT_MAX_FILES=${SIQ_PRIMARY_MARKET_DOCUMENT_ARTIFACT_MAX_FILES:-64}
      - SIQ_PRIMARY_MARKET_DOCUMENT_ARTIFACT_MAX_CONTRACT_BYTES=${SIQ_PRIMARY_MARKET_DOCUMENT_ARTIFACT_MAX_CONTRACT_BYTES:-4194304}
      - SIQ_UPLOAD_PROXY_MAX_CONCURRENCY=${SIQ_UPLOAD_PROXY_MAX_CONCURRENCY:-8}
      - SIQ_UPLOAD_PROXY_QUEUE_TIMEOUT_SECONDS=${SIQ_UPLOAD_PROXY_QUEUE_TIMEOUT_SECONDS:-5}
      - SIQ_REPORT_FINDER_BASE=http://report-finder:8000
      - REPORT_FINDER_BASE=http://report-finder:8000
      - SIQ_MARKET_REPORT_RULES_BASE=http://market-report-rules:8000
      - SIQ_MARKET_REPORT_FINDER_TOKEN=${SIQ_MARKET_REPORT_FINDER_TOKEN:?SIQ_MARKET_REPORT_FINDER_TOKEN is required}
      - SIQ_MARKET_REPORT_RULES_TOKEN=${SIQ_MARKET_REPORT_RULES_TOKEN:?SIQ_MARKET_REPORT_RULES_TOKEN is required}
      - SIQ_REPORT_FINDER_HEALTH_URL=http://report-finder:8000/health
      - SIQ_PDF2MD_HEALTH_URL=http://pdf-parser:15000/api/ready
      - SIQ_DOCUMENT_PARSER_HEALTH_URL=http://document-parser:15010/api/ready
      - SIQ_MARKET_REPORT_RULES_HEALTH_URL=http://market-report-rules:8000/healthz
      - PDF2MD_ACCESS_TOKEN=${PDF2MD_ACCESS_TOKEN:?PDF2MD_ACCESS_TOKEN is required}
    volumes:
      - wiki_data:/state/data/wiki
      - downloads_data:/state/data/market-report-finder/downloads
      - backend_data:/state/data/backend
      - artifacts_data:/state/artifacts
      - runtime_data:/state/var
      - ${SIQ_HERMES_HOST_HOME:?SIQ_HERMES_HOST_HOME is required}:/state/var/hermes/home:ro
      - ../../db:/app/db:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pdf-parser:
        condition: service_healthy
      document-parser:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    mem_limit: ${SIQ_API_MEM_LIMIT:-3g}
    cpus: ${SIQ_API_CPUS:-2.0}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket, urllib.request; urllib.request.urlopen('http://127.0.0.1:18081/health', timeout=3).close(); [socket.create_connection((host, port), timeout=3).close() for host, port in [('postgres', 5432), ('redis', 6379), ('pdf-parser', 15000), ('document-parser', 15010)]]\""]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # 统一公告下载服务
  report-finder:
    build:
      context: ../../services/market-report-finder
      dockerfile: Dockerfile
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp
    expose:
      - "8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - SIQ_DEPLOYMENT_PROFILE=${SIQ_DEPLOYMENT_PROFILE:-local}
      - MARKET_REPORT_DOWNLOAD_DIR=/state/data/market-report-finder/downloads
      - SIQ_MARKET_REPORT_FINDER_TOKEN=${SIQ_MARKET_REPORT_FINDER_TOKEN:?SIQ_MARKET_REPORT_FINDER_TOKEN is required}
      - SEC_USER_AGENT=${SEC_USER_AGENT:-SIQ Research contact@example.com}
    volumes:
      - downloads_data:/state/data/market-report-finder/downloads
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: ${SIQ_REPORT_FINDER_MEM_LIMIT:-1g}
    cpus: ${SIQ_REPORT_FINDER_CPUS:-1.0}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).close()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # 备用市场下载服务
  market-report-finder:
    profiles: ["external-services"]
    build:
      context: ../../services/market-report-finder
      dockerfile: Dockerfile
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_MARKET_REPORT_FINDER_PORT:-18010}:8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - SIQ_DEPLOYMENT_PROFILE=${SIQ_DEPLOYMENT_PROFILE:-local}
      - MARKET_REPORT_DOWNLOAD_DIR=/state/data/market-report-finder/downloads
      - SIQ_MARKET_REPORT_FINDER_TOKEN=${SIQ_MARKET_REPORT_FINDER_TOKEN:?SIQ_MARKET_REPORT_FINDER_TOKEN is required}
      - SEC_USER_AGENT=${SEC_USER_AGENT:-SIQ Research contact@example.com}
    volumes:
      - downloads_data:/state/data/market-report-finder/downloads
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: ${SIQ_REPORT_FINDER_MEM_LIMIT:-1g}
    cpus: ${SIQ_REPORT_FINDER_CPUS:-1.0}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).close()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # 多市场规则服务
  market-report-rules:
    profiles: ["external-services"]
    build:
      context: ../..
      dockerfile: services/market-report-rules/Dockerfile
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_MARKET_REPORT_RULES_PORT:-18020}:8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - SIQ_DEPLOYMENT_PROFILE=${SIQ_DEPLOYMENT_PROFILE:-local}
      - SIQ_CN_REPORT_FINDER_BASE=http://report-finder:8000
      - SIQ_REPORT_FINDER_BASE=http://report-finder:8000
      - SIQ_MARKET_REPORT_RULES_TOKEN=${SIQ_MARKET_REPORT_RULES_TOKEN:?SIQ_MARKET_REPORT_RULES_TOKEN is required}
    depends_on:
      - report-finder
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: ${SIQ_MARKET_REPORT_RULES_MEM_LIMIT:-1g}
    cpus: ${SIQ_MARKET_REPORT_RULES_CPUS:-1.0}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).close()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # PDF解析服务
  pdf-parser:
    build:
      context: ../..
      dockerfile: apps/pdf-parser/Dockerfile
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_PDF2MD_PORT:-15000}:15000"
    environment:
      - MINERU_API_URL=${MINERU_API_URL:-http://host.docker.internal:8003}
      - VLM_API_URL=${VLM_API_URL:-http://host.docker.internal:8002}
      - SIQ_DEPLOYMENT_PROFILE=${SIQ_DEPLOYMENT_PROFILE:-local}
      - PDF2MD_ACCESS_TOKEN=${PDF2MD_ACCESS_TOKEN:?PDF2MD_ACCESS_TOKEN is required}
      - SIQ_LOCAL_STATE_ROOT=/state
      - SIQ_DATA_ROOT=/state/data
      - SIQ_RUNTIME_ROOT=/state/var
      - SIQ_ARTIFACTS_ROOT=/state/artifacts
      - SIQ_PDF2MD_DATA_DIR=/state/data/pdf-parser
      - SIQ_PDF_QUEUE_GLOBAL_TASK_LIMIT=${SIQ_PDF_QUEUE_GLOBAL_TASK_LIMIT:-32}
      - SIQ_PDF_QUEUE_OWNER_TASK_LIMIT=${SIQ_PDF_QUEUE_OWNER_TASK_LIMIT:-8}
      - SIQ_PDF_QUEUE_GLOBAL_BYTES_LIMIT=${SIQ_PDF_QUEUE_GLOBAL_BYTES_LIMIT:-2147483648}
      - SIQ_PDF_QUEUE_OWNER_BYTES_LIMIT=${SIQ_PDF_QUEUE_OWNER_BYTES_LIMIT:-536870912}
      - SIQ_PDF_QUEUE_RETRY_AFTER_SECONDS=${SIQ_PDF_QUEUE_RETRY_AFTER_SECONDS:-30}
      - PORT=15000
    volumes:
      - pdf_parser_data:/state/data/pdf-parser
      - runtime_data:/state/var
      - artifacts_data:/state/artifacts
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: ${SIQ_PDF2MD_MEM_LIMIT:-2g}
    cpus: ${SIQ_PDF2MD_CPUS:-2.0}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:15000/api/ready', timeout=12).close()\""]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # 通用文档解析服务
  document-parser:
    build:
      context: ../../apps/document-parser
      dockerfile: Dockerfile
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_DOCUMENT_PARSER_PORT:-15010}:15010"
    environment:
      - SIQ_LOCAL_STATE_ROOT=/state
      - SIQ_DEPLOYMENT_PROFILE=${SIQ_DEPLOYMENT_PROFILE:-local}
      - SIQ_DATA_ROOT=/state/data
      - SIQ_RUNTIME_ROOT=/state/var
      - SIQ_ARTIFACTS_ROOT=/state/artifacts
      - SIQ_DOCUMENT_PARSE_DATA_DIR=/state/data/document-parser
      - SIQ_PDF2MD_API_BASE=http://pdf-parser:15000
      - SIQ_PDF2MD_DATA_DIR=/state/data/pdf-parser
      - PDF2MD_ACCESS_TOKEN=${PDF2MD_ACCESS_TOKEN:?PDF2MD_ACCESS_TOKEN is required}
      - SIQ_PDF2MD_ACCESS_TOKEN=${PDF2MD_ACCESS_TOKEN:?PDF2MD_ACCESS_TOKEN is required}
      - SIQ_DOCUMENT_PARSER_ACCESS_TOKEN=${SIQ_DOCUMENT_PARSER_ACCESS_TOKEN:?SIQ_DOCUMENT_PARSER_ACCESS_TOKEN is required}
      - SIQ_DOCUMENT_PARSE_PDF_ARTIFACT_TRANSPORT=${SIQ_DOCUMENT_PARSE_PDF_ARTIFACT_TRANSPORT:-api}
      - SIQ_DOCUMENT_PARSE_PDF_STAGE_MAX_FILE_BYTES=${SIQ_DOCUMENT_PARSE_PDF_STAGE_MAX_FILE_BYTES:-134217728}
      - SIQ_DOCUMENT_PARSE_PDF_STAGE_MAX_TOTAL_BYTES=${SIQ_DOCUMENT_PARSE_PDF_STAGE_MAX_TOTAL_BYTES:-1073741824}
      - SIQ_DOCUMENT_PARSE_PDF_STAGE_MAX_FILES=${SIQ_DOCUMENT_PARSE_PDF_STAGE_MAX_FILES:-4096}
      - SIQ_DOCUMENT_PARSE_PDF_STAGE_MAX_JSON_BYTES=${SIQ_DOCUMENT_PARSE_PDF_STAGE_MAX_JSON_BYTES:-16777216}
      - PORT=15010
    volumes:
      - document_parser_data:/state/data/document-parser
      - pdf_parser_data:/state/data/pdf-parser
      - runtime_data:/state/var
      - artifacts_data:/state/artifacts
    depends_on:
      - pdf-parser
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: ${SIQ_DOCUMENT_PARSER_MEM_LIMIT:-2g}
    cpus: ${SIQ_DOCUMENT_PARSER_CPUS:-2.0}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:15010/api/ready', timeout=5).close()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # PostgreSQL数据库
  postgres:
    image: ${SIQ_POSTGRES_IMAGE:-postgres:16-alpine}
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_POSTGRES_PORT:-15432}:5432"
    environment:
      - POSTGRES_DB=siq
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ${SIQ_POSTGRES_DATA_VOLUME:-postgres_data}:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    pids_limit: 512
    mem_limit: ${SIQ_POSTGRES_MEM_LIMIT:-2g}
    cpus: ${SIQ_POSTGRES_CPUS:-2.0}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d siq"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Redis缓存（新增）
  redis:
    image: redis:7-alpine
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    pids_limit: 256
    mem_limit: ${SIQ_REDIS_MEM_LIMIT:-512m}
    cpus: ${SIQ_REDIS_CPUS:-1.0}
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # 监控面板（新增）
  grafana:
    profiles: ["monitoring"]
    image: ${SIQ_GRAFANA_IMAGE:-grafana/grafana:12.0.2}
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_GRAFANA_PORT:-13001}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
    volumes:
      - grafana_data:/var/lib/grafana
    pids_limit: 256
    mem_limit: ${SIQ_GRAFANA_MEM_LIMIT:-512m}
    cpus: ${SIQ_GRAFANA_CPUS:-1.0}
    restart: unless-stopped

volumes:
  wiki_data:
  downloads_data:
  backend_data:
  pdf_parser_data:
  document_parser_data:
  artifacts_data:
  runtime_data:
  postgres_data:
  redis_data:
  grafana_data:
