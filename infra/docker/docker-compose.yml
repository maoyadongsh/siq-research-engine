services:
  # 前端服务
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      args:
        SIQ_AUTH_COOKIE_MODE: ${SIQ_AUTH_COOKIE_MODE:-0}
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_FRONTEND_PORT:-15173}:15173"
    environment:
      - NODE_ENV=production
      - SIQ_BACKEND_URL=http://api:18081
      - SIQ_REPORT_FINDER_URL=http://report-finder:8000
      - SIQ_PDFAPI_URL=http://pdf-parser:15000
      - SIQ_FRONTEND_PORT=15173
      - SIQ_AUTH_COOKIE_MODE=${SIQ_AUTH_COOKIE_MODE:-0}
      - VITE_SIQ_AUTH_COOKIE_MODE=${SIQ_AUTH_COOKIE_MODE:-0}
    depends_on:
      - api
    restart: unless-stopped

  # 聚合后端
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_BACKEND_PORT:-18081}:18081"
    environment:
      - SIQ_LOCAL_STATE_ROOT=/state
      - SIQ_DATA_ROOT=/state/data
      - SIQ_RUNTIME_ROOT=/state/var
      - SIQ_ARTIFACTS_ROOT=/state/artifacts
      - SIQ_DATASETS_ROOT=/app/datasets
      - SIQ_WIKI_ROOT=/state/data/wiki
      - WIKI_ROOT=/state/data/wiki
      - SIQ_REPORT_DOWNLOADS_ROOT=/state/data/market-report-finder/downloads
      - REPORT_DOWNLOADS_ROOT=/state/data/market-report-finder/downloads
      - SIQ_DB_ROOT=/app/db
      - SIQ_APP_DATABASE_URL=postgresql+psycopg://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/siq_app
      - SIQ_DOCUMENT_PGDATABASE=siq_document_parser
      - SIQ_US_PGDATABASE=siq_us
      - SIQ_HK_PGDATABASE=siq_hk
      - SIQ_JP_PGDATABASE=siq_jp
      - SIQ_KR_PGDATABASE=siq_kr
      - SIQ_EU_PGDATABASE=siq_eu
      - REDIS_URL=redis://redis:6379/0
      - SIQ_AGENT_MEMORY_ENABLED=${SIQ_AGENT_MEMORY_ENABLED:-true}
      - SIQ_AGENT_MEMORY_WRITE_ENABLED=${SIQ_AGENT_MEMORY_WRITE_ENABLED:-true}
      - SIQ_AGENT_MEMORY_RETRIEVAL_ENABLED=${SIQ_AGENT_MEMORY_RETRIEVAL_ENABLED:-true}
      - SIQ_AGENT_MEMORY_VECTOR_BACKEND=${SIQ_AGENT_MEMORY_VECTOR_BACKEND:-milvus}
      - SIQ_AGENT_MEMORY_PGVECTOR_ENABLED=${SIQ_AGENT_MEMORY_PGVECTOR_ENABLED:-false}
      - SIQ_MILVUS_HOST=${SIQ_MILVUS_HOST:-host.docker.internal}
      - SIQ_MILVUS_PORT=${SIQ_MILVUS_PORT:-19530}
      - SIQ_MILVUS_COLLECTION=${SIQ_MILVUS_COLLECTION:-siq_deal_shared}
      - SIQ_AGENT_MEMORY_EXTRACTION_ENABLED=${SIQ_AGENT_MEMORY_EXTRACTION_ENABLED:-true}
      - SIQ_AGENT_MEMORY_SCHEMA=${SIQ_AGENT_MEMORY_SCHEMA:-agent_memory}
      - SIQ_AGENT_MEMORY_DEFAULT_VISIBILITY=${SIQ_AGENT_MEMORY_DEFAULT_VISIBILITY:-user_private}
      - SIQ_AGENT_MEMORY_PRIMARY_MARKET_VISIBILITY=${SIQ_AGENT_MEMORY_PRIMARY_MARKET_VISIBILITY:-project_shared}
      - SIQ_AGENT_MEMORY_MILVUS_COLLECTION=${SIQ_AGENT_MEMORY_MILVUS_COLLECTION:-siq_agent_memory}
      - SIQ_AGENT_MEMORY_EMBEDDING_DIM=${SIQ_AGENT_MEMORY_EMBEDDING_DIM:-1024}
      - SIQ_AGENT_MEMORY_EMBEDDING_BASE_URL=${SIQ_AGENT_MEMORY_EMBEDDING_BASE_URL:-http://host.docker.internal:8013}
      - SIQ_AGENT_MEMORY_EMBEDDING_MODEL=${SIQ_AGENT_MEMORY_EMBEDDING_MODEL:-Qwen3-VL-Embedding-2B}
      - SIQ_AGENT_MEMORY_RERANK_ENABLED=${SIQ_AGENT_MEMORY_RERANK_ENABLED:-true}
      - SIQ_AGENT_MEMORY_MAX_ITEMS=${SIQ_AGENT_MEMORY_MAX_ITEMS:-8}
      - SIQ_AGENT_MEMORY_FULL_RECALL_MAX_ITEMS=${SIQ_AGENT_MEMORY_FULL_RECALL_MAX_ITEMS:-25}
      - SIQ_AGENT_MEMORY_MAX_TOKENS=${SIQ_AGENT_MEMORY_MAX_TOKENS:-1800}
      - SIQ_AGENT_MEMORY_MIN_SCORE=${SIQ_AGENT_MEMORY_MIN_SCORE:-0.72}
      - SIQ_AGENT_MEMORY_RETRIEVAL_BUDGET_MS=${SIQ_AGENT_MEMORY_RETRIEVAL_BUDGET_MS:-1200}
      - SIQ_AGENT_MEMORY_RERANK_TIMEOUT=${SIQ_AGENT_MEMORY_RERANK_TIMEOUT:-1.0}
      - SIQ_AGENT_MEMORY_MIN_QUERY_CHARS=${SIQ_AGENT_MEMORY_MIN_QUERY_CHARS:-4}
      - SIQ_AGENT_MEMORY_TIME_DECAY_ENABLED=${SIQ_AGENT_MEMORY_TIME_DECAY_ENABLED:-true}
      - SIQ_AGENT_MEMORY_TIME_DECAY_HALF_LIFE_DAYS=${SIQ_AGENT_MEMORY_TIME_DECAY_HALF_LIFE_DAYS:-30}
      - SIQ_AGENT_MEMORY_TIME_DECAY_FLOOR=${SIQ_AGENT_MEMORY_TIME_DECAY_FLOOR:-0.35}
      - SIQ_AUTH_SECRET_KEY=${SIQ_AUTH_SECRET_KEY:?SIQ_AUTH_SECRET_KEY is required}
      - SIQ_RERANK_BASE_URL=${SIQ_RERANK_BASE_URL:-http://host.docker.internal:8001}
      - SIQ_RERANK_MODEL=${SIQ_RERANK_MODEL:-Qwen3-VL-Reranker-2B}
      - SIQ_AUTH_COOKIE_MODE=${SIQ_AUTH_COOKIE_MODE:-0}
      - SIQ_AUTH_COOKIE_SECURE=${SIQ_AUTH_COOKIE_SECURE:-0}
      - SIQ_AUTH_COOKIE_SAMESITE=${SIQ_AUTH_COOKIE_SAMESITE:-lax}
      - SIQ_SOURCE_TOKEN_SECRET=${SIQ_SOURCE_TOKEN_SECRET:-}
      - SIQ_SOURCE_ACCEPT_LEGACY_AUTH_SECRET=${SIQ_SOURCE_ACCEPT_LEGACY_AUTH_SECRET:-0}
      - SIQ_ALLOW_REGISTRATION=${SIQ_ALLOW_REGISTRATION:-0}
      - SIQ_DEMO_MODE=${SIQ_DEMO_MODE:-0}
      - SIQ_PDF2MD_API_BASE=http://pdf-parser:15000
      - PDF2MD_API_BASE=http://pdf-parser:15000
      - SIQ_DOCUMENT_PARSER_API_BASE=http://document-parser:15010
      - SIQ_REPORT_FINDER_BASE=http://report-finder:8000
      - REPORT_FINDER_BASE=http://report-finder:8000
      - SIQ_MARKET_REPORT_RULES_BASE=http://market-report-rules:8000
      - SIQ_REPORT_FINDER_HEALTH_URL=http://report-finder:8000/health
      - SIQ_PDF2MD_HEALTH_URL=http://pdf-parser:15000/api/health
      - SIQ_DOCUMENT_PARSER_HEALTH_URL=http://document-parser:15010/api/health
      - SIQ_MARKET_REPORT_RULES_HEALTH_URL=http://market-report-rules:8000/healthz
      - PDF2MD_ACCESS_TOKEN=${PDF2MD_ACCESS_TOKEN:?PDF2MD_ACCESS_TOKEN is required}
    volumes:
      - wiki_data:/state/data/wiki
      - downloads_data:/state/data/market-report-finder/downloads
      - backend_data:/state/data/backend
      - artifacts_data:/state/artifacts
      - ../../db:/app/db:ro
    depends_on:
      - postgres
      - redis
      - pdf-parser
      - document-parser
    restart: unless-stopped

  # 统一公告下载服务
  report-finder:
    build:
      context: ../../services/market-report-finder
      dockerfile: Dockerfile
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_REPORT_FINDER_PORT:-18000}:8000"
    environment:
      - MARKET_REPORT_DOWNLOAD_DIR=/state/data/market-report-finder/downloads
      - SEC_USER_AGENT=${SEC_USER_AGENT:-SIQ Research contact@example.com}
    volumes:
      - downloads_data:/state/data/market-report-finder/downloads
    restart: unless-stopped

  # 备用市场下载服务
  market-report-finder:
    profiles: ["external-services"]
    build:
      context: ../../services/market-report-finder
      dockerfile: Dockerfile
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_MARKET_REPORT_FINDER_PORT:-18010}:8000"
    environment:
      - MARKET_REPORT_DOWNLOAD_DIR=/state/data/market-report-finder/downloads
      - SEC_USER_AGENT=${SEC_USER_AGENT:-SIQ Research contact@example.com}
    volumes:
      - downloads_data:/state/data/market-report-finder/downloads
    restart: unless-stopped

  # 多市场规则服务
  market-report-rules:
    profiles: ["external-services"]
    build:
      context: ../..
      dockerfile: services/market-report-rules/Dockerfile
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_MARKET_REPORT_RULES_PORT:-18020}:8000"
    environment:
      - SIQ_CN_REPORT_FINDER_BASE=http://report-finder:8000
      - SIQ_REPORT_FINDER_BASE=http://report-finder:8000
    depends_on:
      - report-finder
    restart: unless-stopped

  # PDF解析服务
  pdf-parser:
    build:
      context: ../../apps/pdf-parser
      dockerfile: Dockerfile
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_PDF2MD_PORT:-15000}:15000"
    environment:
      - MINERU_API_URL=${MINERU_API_URL:-http://host.docker.internal:8003}
      - VLM_API_URL=${VLM_API_URL:-http://host.docker.internal:8002}
      - PDF2MD_ACCESS_TOKEN=${PDF2MD_ACCESS_TOKEN:?PDF2MD_ACCESS_TOKEN is required}
      - SIQ_LOCAL_STATE_ROOT=/state
      - SIQ_DATA_ROOT=/state/data
      - SIQ_RUNTIME_ROOT=/state/var
      - SIQ_ARTIFACTS_ROOT=/state/artifacts
      - SIQ_PDF2MD_DATA_DIR=/state/data/pdf-parser
      - PORT=15000
    volumes:
      - pdf_parser_data:/state/data/pdf-parser
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: ${SIQ_PDF2MD_MEM_LIMIT:-2g}
    cpus: ${SIQ_PDF2MD_CPUS:-2.0}
    restart: unless-stopped

  # 通用文档解析服务
  document-parser:
    build:
      context: ../../apps/document-parser
      dockerfile: Dockerfile
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_DOCUMENT_PARSER_PORT:-15010}:15010"
    environment:
      - SIQ_LOCAL_STATE_ROOT=/state
      - SIQ_DATA_ROOT=/state/data
      - SIQ_RUNTIME_ROOT=/state/var
      - SIQ_ARTIFACTS_ROOT=/state/artifacts
      - SIQ_DOCUMENT_PARSE_DATA_DIR=/state/data/document-parser
      - SIQ_PDF2MD_API_BASE=http://pdf-parser:15000
      - SIQ_PDF2MD_DATA_DIR=/state/data/pdf-parser
      - PORT=15010
    volumes:
      - document_parser_data:/state/data/document-parser
      - pdf_parser_data:/state/data/pdf-parser
    depends_on:
      - pdf-parser
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: ${SIQ_DOCUMENT_PARSER_MEM_LIMIT:-2g}
    cpus: ${SIQ_DOCUMENT_PARSER_CPUS:-2.0}
    restart: unless-stopped

  # PostgreSQL数据库
  postgres:
    image: ${SIQ_POSTGRES_IMAGE:-postgres:16-alpine}
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_POSTGRES_PORT:-15432}:5432"
    environment:
      - POSTGRES_DB=siq
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ${SIQ_POSTGRES_DATA_VOLUME:-postgres_data}:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  # Redis缓存（新增）
  redis:
    image: redis:7-alpine
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # 监控面板（新增）
  grafana:
    profiles: ["monitoring"]
    image: ${SIQ_GRAFANA_IMAGE:-grafana/grafana:12.0.2}
    ports:
      - "${SIQ_COMPOSE_BIND_HOST:-127.0.0.1}:${SIQ_GRAFANA_PORT:-13001}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  wiki_data:
  downloads_data:
  backend_data:
  pdf_parser_data:
  document_parser_data:
  artifacts_data:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  default:
    name: siq_network
