{
  "version": 1,
  "filesystem_policy": {
    "include_workdir": false,
    "read_only": [
      "/dev/urandom",
      "/etc/alternatives",
      "/etc/ca-certificates",
      "/etc/ca-certificates.conf",
      "/etc/debian_version",
      "/etc/fonts",
      "/etc/gai.conf",
      "/etc/group",
      "/etc/host.conf",
      "/etc/hostname",
      "/etc/hosts",
      "/etc/inputrc",
      "/etc/ld.so.cache",
      "/etc/ld.so.conf",
      "/etc/ld.so.conf.d",
      "/etc/localtime",
      "/etc/netconfig",
      "/etc/networks",
      "/etc/nsswitch.conf",
      "/etc/os-release",
      "/etc/passwd",
      "/etc/profile",
      "/etc/protocols",
      "/etc/resolv.conf",
      "/etc/services",
      "/etc/ssl",
      "/etc/terminfo",
      "/home/sandbox/.bashrc",
      "/home/sandbox/.profile",
      "/lib",
      "/opt/hermes-agent",
      "/opt/siq",
      "/proc",
      "/usr",
      "${SIQ_PROJECT_ROOT}"
    ],
    "read_write": [
      "/dev/null",
      "/sandbox",
      "/tmp"
    ]
  },
  "landlock": {
    "compatibility": "hard_requirement"
  },
  "process": {
    "run_as_group": "sandbox",
    "run_as_user": "sandbox"
  },
  "network_policies": {
    "siq_egress_guard": {
      "name": "siq-egress-guard",
      "endpoints": [
        {
          "host": "host.openshell.internal",
          "port": 18792
        }
      ],
      "binaries": [
        {"path": "/opt/siq/hermes/venv/bin/python"},
        {"path": "/usr/bin/curl"},
        {"path": "/usr/bin/git"},
        {"path": "/usr/local/node/bin/node"}
      ]
    },
    "siq_data_broker": {
      "name": "siq-data-broker",
      "endpoints": [
        {
          "host": "host.openshell.internal",
          "port": 18793
        }
      ],
      "binaries": [
        {"path": "/opt/siq/hermes/venv/bin/python"}
      ]
    },
    "siq_internal_services": {
      "name": "siq-internal-services",
      "endpoints": [
        {"host": "host.openshell.internal", "port": 8004},
        {"host": "host.openshell.internal", "port": 8006},
        {"host": "host.openshell.internal", "port": 8007},
        {"host": "host.openshell.internal", "port": 8013}
      ],
      "binaries": [
        {"path": "/opt/siq/hermes/venv/bin/python"}
      ]
    }
  }
}
