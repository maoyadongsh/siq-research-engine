      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#0071e3" flood-opacity=".34"/>
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
    <clipPath id="screenClip">
