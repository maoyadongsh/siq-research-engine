<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="430" viewBox="0 0 1440 430" role="img" aria-labelledby="title desc">
  <title id="title">SIQ 智能投研工作流</title>
  <desc id="desc">展示从多市场披露文件、解析引擎、解析产物、数据底座、智能体协同到可审计报告的工作流。</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset="0.54" stop-color="#eef7ff"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.56" stop-color="#0071e3"/>
      <stop offset="1" stop-color="#0f4fb8"/>
    </linearGradient>
    <linearGradient id="lineBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#0071e3"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="softBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eaf5ff"/>
    </linearGradient>
    <linearGradient id="softGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ecfdf5"/>
    </linearGradient>
    <linearGradient id="softAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0v36" fill="none" stroke="#0071e3" stroke-opacity=".06" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0f172a" flood-opacity=".13"/>
    </filter>
    <filter id="smallShadow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
  </defs>

  <rect width="1440" height="430" rx="34" fill="url(#surface)"/>
  <rect width="1440" height="430" rx="34" fill="url(#grid)"/>
  <path d="M44 358c128-58 244-48 350-10 128 46 230 46 350-8 138-62 258-58 398 8 92 44 172 48 254 10" fill="none" stroke="#0071e3" stroke-opacity=".12" stroke-width="2"/>
  <path d="M40 92h1360M40 332h1360" stroke="#cbdff4" stroke-opacity=".5" stroke-width="1"/>

  <g font-family="Inter, 'Noto Sans CJK SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g filter="url(#smallShadow)">
      <rect x="54" y="55" width="64" height="64" rx="18" fill="url(#brand)"/>
      <text x="86" y="94" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="900">SIQ</text>
    </g>
    <text x="138" y="78" fill="#0f172a" font-size="24" font-weight="850">智能投研工作流</text>
    <text x="138" y="106" fill="#475569" font-size="15" font-weight="600">从披露文件到可追溯、可核查、可复用的研究结论</text>

    <g transform="translate(52 142)">
      <rect width="230" height="142" rx="22" fill="#ffffff" stroke="#c8dcf2" filter="url(#shadow)"/>
      <rect x="18" y="18" width="40" height="40" rx="12" fill="#eaf5ff" stroke="#b8d6f3"/>
      <path d="M31 28h14l7 7v15H31Z" fill="#ffffff" stroke="#0071e3" stroke-width="2"/>
      <path d="M45 28v7h7M36 42h12M36 49h9" stroke="#0071e3" stroke-width="2" stroke-linecap="round"/>
      <text x="72" y="35" fill="#0f172a" font-size="17" font-weight="850">多市场披露</text>
      <text x="72" y="60" fill="#64748b" font-size="13" font-weight="620">年报、公告、附件</text>
      <g fill="#f8fbff" stroke="#d1e2f4">
        <rect x="20" y="88" width="42" height="26" rx="13"/>
        <rect x="70" y="88" width="42" height="26" rx="13"/>
        <rect x="120" y="88" width="42" height="26" rx="13"/>
        <rect x="170" y="88" width="42" height="26" rx="13"/>
      </g>
      <g fill="#334155" font-size="12" font-weight="760">
        <text x="41" y="105" text-anchor="middle">A 股</text>
        <text x="91" y="105" text-anchor="middle">港股</text>
        <text x="141" y="105" text-anchor="middle">美股</text>
        <text x="191" y="105" text-anchor="middle">海外</text>
      </g>
    </g>

    <g transform="translate(338 124)">
      <rect width="210" height="178" rx="24" fill="url(#softBlue)" stroke="#c8dcf2" filter="url(#shadow)"/>
      <text x="28" y="37" fill="#0f172a" font-size="18" font-weight="850">智能解析引擎</text>
      <text x="28" y="62" fill="#64748b" font-size="13" font-weight="620">PDF / HTML / iXBRL</text>
      <g transform="translate(28 86)">
        <rect width="154" height="54" rx="16" fill="#ffffff" stroke="#cfe0f2"/>
        <path d="M22 19h40M22 31h70M22 43h52" stroke="#7aa7d9" stroke-width="4" stroke-linecap="round" opacity=".58"/>
        <rect x="104" y="14" width="34" height="26" rx="8" fill="#e0f2fe" stroke="#93c5fd"/>
        <text x="121" y="32" text-anchor="middle" fill="#0071e3" font-size="11" font-weight="850">OCR</text>
      </g>
      <text x="28" y="162" fill="#0f172a" font-size="13" font-weight="760">版面、表格、指标、证据定位</text>
    </g>

    <g transform="translate(614 95)">
      <rect width="220" height="236" rx="26" fill="#ffffff" stroke="#c8dcf2" filter="url(#shadow)"/>
      <text x="28" y="39" fill="#0f172a" font-size="18" font-weight="850">解析产物</text>
      <text x="28" y="64" fill="#64748b" font-size="13" font-weight="620">入库与检索的直接来源</text>
      <g transform="translate(28 92)">
        <rect width="164" height="32" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
        <text x="18" y="21" fill="#0f172a" font-size="12" font-weight="760">Markdown 正文</text>
      </g>
      <g transform="translate(28 134)">
        <rect width="164" height="32" rx="10" fill="#f0fdfa" stroke="#99f6e4"/>
        <text x="18" y="21" fill="#0f172a" font-size="12" font-weight="760">表格与财务指标</text>
      </g>
      <g transform="translate(28 176)">
        <rect width="164" height="32" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
        <text x="18" y="21" fill="#0f172a" font-size="12" font-weight="760">证据片段与页码</text>
      </g>
    </g>

    <g transform="translate(900 84)">
      <rect width="220" height="112" rx="24" fill="url(#softGreen)" stroke="#c8dcf2" filter="url(#shadow)"/>
      <text x="28" y="37" fill="#0f172a" font-size="18" font-weight="850">质量门禁</text>
      <text x="28" y="64" fill="#64748b" font-size="13" font-weight="620">哈希、来源、完整性、交叉检查</text>
      <g fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M31 86l9 9 20-24"/>
        <path d="M82 86l9 9 20-24"/>
        <path d="M133 86l9 9 20-24"/>
      </g>
    </g>

    <g transform="translate(900 222)">
      <rect width="220" height="112" rx="24" fill="#ffffff" stroke="#c8dcf2" filter="url(#shadow)"/>
      <text x="28" y="37" fill="#0f172a" font-size="18" font-weight="850">数据底座</text>
      <text x="28" y="63" fill="#64748b" font-size="13" font-weight="620">结构化库 / 语义索引</text>
      <text x="28" y="83" fill="#64748b" font-size="13" font-weight="620">缓存队列</text>
      <path d="M144 78c0 8 16 14 34 14s34-6 34-14M144 78c0-8 16-14 34-14s34 6 34 14M144 78v16c0 8 16 14 34 14s34-6 34-14V78" fill="none" stroke="#0071e3" stroke-width="3" stroke-linecap="round" opacity=".66"/>
    </g>

    <g transform="translate(1178 82)">
      <rect width="210" height="252" rx="26" fill="url(#softAmber)" stroke="#c8dcf2" filter="url(#shadow)"/>
      <text x="28" y="39" fill="#0f172a" font-size="18" font-weight="850">智能体协同</text>
      <text x="28" y="64" fill="#64748b" font-size="13" font-weight="620">分析、核查、合规、跟踪</text>
      <g transform="translate(30 93)" fill="#ffffff" stroke="#d5e3f3">
        <rect width="64" height="48" rx="14"/>
        <rect x="84" width="64" height="48" rx="14"/>
        <rect y="68" width="64" height="48" rx="14"/>
        <rect x="84" y="68" width="64" height="48" rx="14"/>
      </g>
      <g fill="#0f172a" font-size="12" font-weight="800">
        <text x="62" y="122" text-anchor="middle">分析</text>
        <text x="146" y="122" text-anchor="middle">核查</text>
        <text x="62" y="190" text-anchor="middle">法务</text>
        <text x="146" y="190" text-anchor="middle">跟踪</text>
      </g>
      <path d="M52 226h106" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
      <path d="M52 226l-10-10M52 226l-10 10M158 226l10-10M158 226l10 10" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    </g>

    <path d="M282 213h56M548 213h66M834 213h66M1120 213h58" fill="none" stroke="url(#lineBlue)" stroke-width="6" stroke-linecap="round"/>
    <path d="M842 155h58M842 272h58" fill="none" stroke="url(#lineBlue)" stroke-width="5" stroke-linecap="round" opacity=".75"/>
    <g fill="#0071e3">
      <path d="M332 205l14 8-14 8z"/>
      <path d="M608 205l14 8-14 8z"/>
      <path d="M894 147l14 8-14 8z"/>
      <path d="M894 264l14 8-14 8z"/>
      <path d="M1172 205l14 8-14 8z"/>
    </g>

    <g transform="translate(224 356)" filter="url(#smallShadow)">
      <rect width="992" height="48" rx="18" fill="#ffffff" fill-opacity=".86" stroke="#c9dbee"/>
      <g fill="#0f172a" font-size="13" font-weight="800">
        <text x="78" y="30">直接从解析产物入库</text>
        <text x="358" y="30">结论可回溯到证据</text>
        <text x="638" y="30">低可信结果不晋升为事实</text>
      </g>
      <g fill="#0071e3">
        <circle cx="54" cy="25" r="6"/>
        <circle cx="334" cy="25" r="6"/>
        <circle cx="614" cy="25" r="6"/>
      </g>
    </g>

    <g transform="translate(52 310)">
      <rect width="196" height="34" rx="17" fill="#ffffff" fill-opacity=".82" stroke="#c9dbee"/>
      <text x="18" y="22" fill="#475569" font-size="12" font-weight="760">派生知识资产用于复用，不作为主入库源</text>
    </g>
  </g>
</svg>
