<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Research Engine 字标方案</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Archivo:wght@400;600&family=Bebas+Neue&family=Bitter:wght@500;700&family=Cabin:wght@500;700&family=Cardo:wght@400;700&family=Cormorant+Garamond:wght@500;700&family=DM+Sans:wght@500;700&family=DM+Serif+Display&family=Domine:wght@500;700&family=EB+Garamond:wght@500;700&family=Figtree:wght@500;700&family=IBM+Plex+Mono:wght@500;700&family=IBM+Plex+Sans:wght@500;700&family=IBM+Plex+Serif:wght@500;700&family=Inconsolata:wght@600;800&family=Inter:wght@500;700&family=Josefin+Sans:wght@500;700&family=Karla:wght@500;700&family=Lato:wght@500;700&family=Libre+Baskerville:wght@400;700&family=Libre+Franklin:wght@500;700&family=Lora:wght@500;700&family=Manrope:wght@500;700&family=Merriweather:wght@400;700&family=Montserrat:wght@500;700&family=Mulish:wght@500;700&family=Newsreader:wght@500;700&family=Noto+Sans:wght@500;700&family=Noto+Serif:wght@500;700&family=Nunito+Sans:wght@500;700&family=Old+Standard+TT:wght@400;700&family=Oswald:wght@500;700&family=Outfit:wght@500;700&family=Playfair+Display:wght@500;700&family=Plus+Jakarta+Sans:wght@500;700&family=Prata&family=Raleway:wght@500;700&family=Roboto+Slab:wght@500;700&family=Rubik:wght@500;700&family=Source+Sans+3:wght@500;700&family=Source+Serif+4:wght@500;700&family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&family=Spectral:wght@500;700&family=Syne:wght@500;700&family=Urbanist:wght@500;700&family=Work+Sans:wght@500;700&family=Zilla+Slab:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box} body{margin:0;background:#f5f4f1;color:#181714;font-family:Inter,Arial,sans-serif} header{position:sticky;top:0;z-index:2;display:flex;align-items:end;justify-content:space-between;padding:24px 34px;border-bottom:1px solid #d9d6cf;background:rgba(245,244,241,.96)} h1{margin:0;font:600 25px/1.2 Inter,sans-serif} header p{margin:0;color:#77736b;font-size:13px}.shortlist{padding:28px 34px 34px;border-bottom:1px solid #d9d6cf}.shortlist h2{margin:0 0 16px;font-size:15px;font-weight:600}.cover{position:relative;display:grid;grid-template-columns:248px 1fr;height:92px;margin-top:12px;border:1px solid #d9d6cf;background:#fbfaf8}.brand{display:flex;align-items:center;gap:13px;padding:0 22px;border-right:1px solid #d9d6cf}.siq{display:grid;flex:0 0 36px;width:36px;height:36px;place-items:center;border:1px solid #4b4944;border-radius:50%;font:700 12px/1 Cardo,serif}.brand-name{font-size:18px;white-space:nowrap}.cover-main{display:flex;align-items:center;justify-content:space-between;padding:0 26px}.search{width:min(490px,60%);height:40px;border:1px solid #d9d6cf;background:white;padding:10px 16px;color:#9b978e;font-size:13px}.tools{display:flex;gap:25px;color:#5d5952;font-size:13px}.candidate{position:absolute;right:12px;bottom:8px;color:#8a867e;font:11px/1 'IBM Plex Mono',monospace}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:1px;background:#d9d6cf;border-bottom:1px solid #d9d6cf}.item{position:relative;min-height:150px;display:flex;align-items:center;justify-content:center;background:#fbfaf8;padding:30px 24px}.number{position:absolute;left:15px;top:13px;color:#9b978e;font:11px/1 'IBM Plex Mono',monospace}.mark{color:#181714;white-space:nowrap;text-align:center;font-size:25px;line-height:1.15}.item:nth-child(4n+2) .mark{font-size:27px}.item:nth-child(4n+3) .mark{letter-spacing:.035em}.item:nth-child(4n) .mark{font-size:23px;letter-spacing:.075em}@media(max-width:700px){header,.shortlist{padding-left:18px;padding-right:18px}.cover{grid-template-columns:1fr;height:auto}.brand{height:72px;border-right:0;border-bottom:1px solid #d9d6cf}.cover-main{height:64px}.tools{display:none}.search{width:100%}.grid{grid-template-columns:1fr}.item{min-height:125px}}
  </style>
</head>
<body>
  <header><div><h1>Research Engine 字标方案</h1><p>100 个字体与字重组合，点击编号记录候选</p></div><p>01-100</p></header>
  <section class="shortlist">
    <h2>首页环境对比</h2>
    <div class="cover">
      <div class="brand"><span class="siq">SIQ</span><span class="brand-name" style="font-family:'Cardo',serif;font-weight:500">Research Engine</span></div>
      <div class="cover-main"><div class="search">搜索公司、代码、报告或文档</div><div class="tools"><span>通知</span><span>设置</span><span>账户</span></div></div>
      <span class="candidate">06 · Cardo</span>
    </div>
    <div class="cover">
      <div class="brand"><span class="siq">SIQ</span><span class="brand-name" style="font-family:'Prata',serif;font-weight:400">Research Engine</span></div>
      <div class="cover-main"><div class="search">搜索公司、代码、报告或文档</div><div class="tools"><span>通知</span><span>设置</span><span>账户</span></div></div>
      <span class="candidate">37 · Prata</span>
    </div>
  </section>
  <main class="grid" id="gallery"></main>
  <script>
    const fonts=['Abril Fatface','Archivo','Bebas Neue','Bitter','Cabin','Cardo','Cormorant Garamond','DM Sans','DM Serif Display','Domine','EB Garamond','Figtree','IBM Plex Mono','IBM Plex Sans','IBM Plex Serif','Inconsolata','Inter','Josefin Sans','Karla','Lato','Libre Baskerville','Libre Franklin','Lora','Manrope','Merriweather','Montserrat','Mulish','Newsreader','Noto Sans','Noto Serif','Nunito Sans','Old Standard TT','Oswald','Outfit','Playfair Display','Plus Jakarta Sans','Prata','Raleway','Roboto Slab','Rubik','Source Sans 3','Source Serif 4','Space Grotesk','Space Mono','Spectral','Syne','Urbanist','Work Sans','Zilla Slab','Georgia'];
    const gallery=document.querySelector('#gallery');
    [...fonts,...fonts].forEach((font,index)=>{
      const item=document.createElement('section');
      item.className='item';
      const second=index>=fonts.length;
      item.innerHTML=`<span class="number">${String(index+1).padStart(2,'0')}</span><div class="mark">Research Engine</div>`;
      const mark=item.querySelector('.mark');
      mark.style.fontFamily=`'${font}', serif`;
      mark.style.fontWeight=second?'700':'500';
      if(second && index%3===0) mark.style.fontStyle='italic';
      gallery.appendChild(item);
    });
  </script>
</body>
</html>
