repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: ^(data|artifacts|var|runtimes)/
  - repo: local
    hooks:
      - id: ruff-fingerprint-gate
        name: Ruff new-fingerprint gate
        entry: python scripts/maintenance/check_python_quality_touched.py --base-ref HEAD --require-ruff
        language: python
        additional_dependencies:
          - ruff==0.14.10
        files: \.py$
        exclude: ^(data|artifacts|var|runtimes)/
      - id: mypy-whitelist-gate
        name: mypy whitelist gate
        entry: python scripts/maintenance/check_mypy_whitelist.py --require-mypy
        language: python
        additional_dependencies:
          - mypy==1.14.1
        pass_filenames: false
        files: ^(mypy\.ini|scripts/maintenance/mypy_whitelist\.toml|.*\.py)$
        exclude: ^(data|artifacts|var|runtimes)/
