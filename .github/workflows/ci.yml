name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  security-and-config:
    name: Security and config gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run actionlint
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.7

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run shellcheck
        run: |
          shellcheck -e SC1091 \
            scripts/check_all.sh \
            scripts/check_owner_migration.sh \
            scripts/check_async_db_audit.sh \
            scripts/ci/observe_security_artifacts.sh \
            scripts/ops/run_market_postgres_release_gate.sh \
            start_all.sh \
            apps/api/start.sh \
            apps/pdf-parser/run.sh \
            apps/document-parser/run.sh \
            scripts/hermes/profile_dir.sh \
            scripts/hermes/run_gateway.sh

      - name: Secret scan
        run: |
          scan_root="$(mktemp -d)"
          git archive --format=tar HEAD | tar -x -C "$scan_root"
          docker run --rm -v "$scan_root:/repo:ro" ghcr.io/gitleaks/gitleaks:v8.24.2 \
            detect --source=/repo --redact --verbose --no-git

      - name: Docker Compose config
        run: docker compose -f infra/docker/docker-compose.yml --env-file infra/env/local.example config

      - name: Local security hygiene config gate
        run: python3 scripts/maintenance/check_local_security_hygiene.py --scope workflow

      - name: Dockerfile lint
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo hadolint/hadolint:v2.12.0 \
            hadolint \
            apps/api/Dockerfile \
            apps/web/Dockerfile \
            apps/pdf-parser/Dockerfile \
            apps/document-parser/Dockerfile \
            services/market-report-finder/Dockerfile \
            services/market-report-rules/Dockerfile

      - name: Generate observe security artifacts
        run: bash scripts/ci/observe_security_artifacts.sh

      - name: Upload observe security artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: siq-security-observe
          path: artifacts/security/
          if-no-files-found: warn

      - name: Filesystem security scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL
          skip-dirs: data,var,artifacts,runtimes
          ignore-unfixed: true
          exit-code: '1'

  script-syntax:
    name: Script syntax
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check shell entrypoints
        run: |
          bash -n scripts/check_all.sh
          bash -n scripts/check_owner_migration.sh
          bash -n scripts/check_async_db_audit.sh
          bash -n scripts/ci/observe_security_artifacts.sh
          bash -n scripts/ops/run_market_postgres_release_gate.sh
          bash -n start_all.sh
          bash -n apps/api/start.sh
          bash -n apps/pdf-parser/run.sh
          bash -n apps/document-parser/run.sh
          bash -n scripts/hermes/profile_dir.sh
          bash -n scripts/hermes/run_gateway.sh
          python3 -m py_compile \
            scripts/scan_todo_fixme.py \
            scripts/ops/health_check.py \
            scripts/migration/plan_runtime_paths.py \
            scripts/maintenance/check_local_security_hygiene.py \
            scripts/maintenance/check_large_file_changes.py \
            scripts/maintenance/check_python_quality_touched.py \
            scripts/maintenance/tests/test_container_security_config.py \
            scripts/maintenance/observe_large_files.py \
            scripts/maintenance/run_market_ingestion_eval.py \
            scripts/maintenance/run_financial_qa_benchmark.py \
            scripts/maintenance/run_market_document_full_postgres_gate.py \
            db/imports/analyze_market_document_full_duplicates.py \
            apps/api/services/runtime_security.py

      - name: Touched Python quality advisory
        run: |
          mkdir -p artifacts/quality
          python3 scripts/maintenance/check_python_quality_touched.py --json > artifacts/quality/python-quality-touched.json
          cat artifacts/quality/python-quality-touched.json

      - name: Changed large-file gate
        if: github.event_name == 'pull_request'
        run: python3 scripts/maintenance/check_large_file_changes.py --base-ref "origin/${{ github.base_ref }}"

      - name: Generate large-file observe report
        run: |
          mkdir -p artifacts/quality
          python3 scripts/maintenance/observe_large_files.py --json > artifacts/quality/large-files.json
          python3 scripts/maintenance/observe_large_files.py

      - name: Upload quality observe reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: siq-quality-observe
          path: artifacts/quality/*.json
          if-no-files-found: warn

  api-focused:
    name: API focused tests
    runs-on: ubuntu-latest
    env:
      SIQ_AUTH_SECRET_KEY: ci-auth-secret-with-at-least-32-chars
      SIQ_SOURCE_TOKEN_SECRET: ci-source-secret-with-at-least-32-chars
      DATABASE_URL: sqlite:////tmp/siq-api-test.db
      SIQ_DATA_ROOT: /tmp/siq-data
      SIQ_RUNTIME_ROOT: /tmp/siq-runtime
      SIQ_ARTIFACTS_ROOT: /tmp/siq-artifacts
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install API dependencies
        working-directory: apps/api
        run: uv sync --frozen --extra dev

      - name: Run API focused tests
        working-directory: apps/api
        run: |
          uv run python -m pytest \
            tests/test_async_sync_session_audit.py \
            tests/test_agent_runtime_active_runs.py \
            tests/test_agent_runtime_answer_audit.py \
            tests/test_agent_runtime_diagnostics.py \
            tests/test_agent_chat_runtime_loops.py \
            tests/test_agent_runtime_chat_preflight.py \
            tests/test_auth_dependencies_smoke.py \
            tests/test_chat_async_achievements.py \
            tests/test_chat_document_parser_attachment.py \
            tests/test_chat_route_usage.py \
            tests/test_deal_documents.py \
            tests/test_deal_store.py \
            tests/test_deals_router.py \
            tests/test_document_parser_proxy.py \
            tests/test_eval_e2e_config.py \
            tests/test_hermes_ic_profiles.py \
            tests/test_ic_policy.py \
            tests/test_market_document_full_postgres_status.py \
            tests/test_runtime_security.py \
            tests/test_source_access.py \
            tests/test_tracking_agent_permissions.py \
            tests/test_tracking_runtime.py \
            tests/test_usage_service_async.py \
            tests/test_workspace_sync.py \
            -q

      - name: Run async DB audit advisory
        run: API_PY=apps/api/.venv/bin/python scripts/check_async_db_audit.sh

  web-check:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run web unit tests
        working-directory: apps/web
        run: npm run test:unit

      - name: Run frontend check
        working-directory: apps/web
        run: npm run check:frontend

  python-services:
    name: Python service tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install parser test dependencies
        run: |
          python -m pip install --upgrade pip uv pytest
          python -m pip install \
            -c apps/pdf-parser/constraints.txt \
            -r apps/pdf-parser/requirements.txt \
            -r apps/document-parser/requirements.txt

      - name: Run PDF parser tests
        working-directory: apps/pdf-parser
        run: python -m pytest tests

      - name: Run document parser tests
        working-directory: apps/document-parser
        run: python -m pytest tests

      - name: Run market report finder tests
        working-directory: services/market-report-finder
        run: |
          uv sync --frozen --extra dev
          uv run python -m pytest tests

      - name: Run market report rules tests
        working-directory: services/market-report-rules
        run: |
          uv sync --frozen --extra dev
          uv run pytest

      - name: Run market contracts tests
        working-directory: packages/market-contracts
        run: |
          uv sync --frozen --extra dev
          uv run python -m pytest tests

  market-eval:
    name: Market ingestion eval
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run market gate helper tests
        run: |
          python -m pytest \
            scripts/maintenance/tests/test_run_market_document_full_postgres_gate.py \
            scripts/maintenance/tests/test_run_financial_qa_benchmark.py \
            scripts/maintenance/tests/test_check_python_quality_touched.py \
            scripts/maintenance/tests/test_check_large_file_changes.py \
            db/imports/tests/test_document_fact_normalizer.py \
            db/imports/tests/test_contract_cases.py \
            db/imports/tests/test_agent_view_parity_helpers.py \
            db/imports/tests/test_agent_query_gate.py \
            db/imports/tests/test_postgres_roundtrip_helpers.py \
            db/imports/tests/test_postgres_roundtrip_gate.py \
            db/imports/tests/test_production_sample_gate.py \
            db/imports/tests/test_report_writer.py \
            db/imports/tests/test_wiki_postgres_parity_gate.py \
            db/imports/tests/test_analyze_market_document_full_duplicates.py \
            db/imports/tests/test_cleanup_market_document_full_parse_runs.py \
            -q

      - name: Run static market ingestion eval
        run: |
          python scripts/maintenance/run_market_ingestion_eval.py \
            --case-root datasets/market_ingestion \
            --legacy-case-root datasets/market_ingestion \
            --output artifacts/eval-runs/ci/market_ingestion_eval_report.json \
            --markdown artifacts/eval-runs/ci/market_ingestion_eval_report.md

      - name: Run market document_full PostgreSQL contract gate
        run: |
          python scripts/maintenance/run_market_document_full_postgres_gate.py \
            --mode contract \
            --output-dir artifacts/eval-runs/ci

      - name: Run financial QA benchmark
        run: |
          python scripts/maintenance/run_financial_qa_benchmark.py \
            --mode trace-offline \
            --case-root datasets/eval/financial_qa_benchmark/v1 \
            --trace-log datasets/eval/financial_qa_benchmark/v1/traces/p0_golden_traces.jsonl \
            --output artifacts/eval-runs/ci/financial_qa_benchmark.json \
            --markdown artifacts/eval-runs/ci/financial_qa_benchmark.md

      - name: Enforce eval completed
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          market_report = json.loads(Path("artifacts/eval-runs/ci/market_ingestion_eval_report.json").read_text())
          market_cases = int(market_report.get("summary", {}).get("cases", 0))
          if market_cases <= 0:
              raise SystemExit("market ingestion eval loaded no cases")
          print(f"market ingestion eval cases: {market_cases}")

          qa_report = json.loads(Path("artifacts/eval-runs/ci/financial_qa_benchmark.json").read_text())
          qa_summary = qa_report.get("summary", {})
          qa_cases = int(qa_summary.get("cases", 0))
          if qa_cases <= 0:
              raise SystemExit("financial QA benchmark loaded no cases")
          if not qa_report.get("passed"):
              raise SystemExit("financial QA benchmark did not pass")
          print(f"financial QA benchmark cases: {qa_cases}")
          PY

      - name: Upload market eval report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: market-ingestion-eval
          path: artifacts/eval-runs/ci/
          if-no-files-found: warn

  web-e2e-smoke:
    name: Web E2E smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        working-directory: apps/web
        run: npm run e2e
