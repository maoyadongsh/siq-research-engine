name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - master
      - main
      - 'feat/**'
    paths:
      - 'docs/site/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    outputs:
      pages-enabled: ${{ steps.set-pages-enabled.outputs.enabled }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install MkDocs Material and plugins
        run: |
          python -m pip install --upgrade pip
          pip install \
            mkdocs==1.6.1 \
            mkdocs-material==9.5.49

      - name: Build documentation
        run: mkdocs build --strict

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-site
          path: ./site
          retention-days: 14

      - name: Check GitHub Pages availability
        id: setup-pages
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
        continue-on-error: true

      - name: Set pages-enabled output
        id: set-pages-enabled
        if: steps.setup-pages.outcome == 'success'
        run: echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Upload Pages artifact
        if: steps.setup-pages.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.pages-enabled == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4