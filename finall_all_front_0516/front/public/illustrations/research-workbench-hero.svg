<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 248" role="img" aria-labelledby="title desc">
  <title id="title">金融科技研究工作台插画</title>
  <desc id="desc">蓝白玻璃质感的公司研究桌面，包含财报文档、数据图表、核查标记、跟踪曲线和法务天平元素。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafdff"/>
      <stop offset=".44" stop-color="#eef7ff"/>
      <stop offset="1" stop-color="#f8fffd"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".96"/>
      <stop offset="1" stop-color="#eaf5ff" stop-opacity=".78"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#42a5ff"/>
      <stop offset="1" stop-color="#0071e3"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx=".48" cy=".48" r=".62">
      <stop offset="0" stop-color="#42a5ff" stop-opacity=".24"/>
      <stop offset=".52" stop-color="#42a5ff" stop-opacity=".08"/>
      <stop offset="1" stop-color="#42a5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".10"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0v28" fill="none" stroke="#0071e3" stroke-opacity=".07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1040" height="248" rx="28" fill="url(#bg)"/>
  <rect width="1040" height="248" rx="28" fill="url(#grid)"/>
  <ellipse cx="508" cy="126" rx="430" ry="146" fill="url(#glow)"/>

