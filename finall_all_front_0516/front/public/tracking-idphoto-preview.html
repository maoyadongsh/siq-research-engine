<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tracking Agent ID Photo Candidates</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
        background: #f5f7fb;
      }
      body {
        margin: 0;
        padding: 24px;
      }
      h1 {
        margin: 0 0 18px;
        font-size: 22px;
        line-height: 1.3;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(260px, 1fr));
        gap: 18px;
        max-width: 1100px;
      }
      figure {
        margin: 0;
        background: white;
        border: 1px solid #d8dee9;
        border-radius: 8px;
        padding: 14px;
        box-shadow: 0 10px 28px rgba(32, 44, 68, 0.08);
      }
      img {
        display: block;
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: contain;
        background: #ff0088;
        border-radius: 6px;
      }
      figcaption {
        margin-top: 10px;
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 0;
      }
      @media (max-width: 720px) {
        body {
          padding: 14px;
        }
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <h1>FinSight_tracking 证件照式形象候选</h1>
    <main class="grid">
      <figure>
        <img src="/pet/agent-drafts/beauty-candidates/tracking-idphoto-20260520/finsight-tracking-idphoto-a-source-magenta.png" alt="Candidate A" />
        <figcaption>A</figcaption>
      </figure>
      <figure>
        <img src="/pet/agent-drafts/beauty-candidates/tracking-idphoto-20260520/finsight-tracking-idphoto-b-source-magenta.png" alt="Candidate B" />
        <figcaption>B</figcaption>
      </figure>
      <figure>
        <img src="/pet/agent-drafts/beauty-candidates/tracking-idphoto-20260520/finsight-tracking-idphoto-c-source-magenta.png" alt="Candidate C" />
        <figcaption>C</figcaption>
      </figure>
      <figure>
        <img src="/pet/agent-drafts/beauty-candidates/tracking-idphoto-20260520/finsight-tracking-idphoto-d-source-magenta.png" alt="Candidate D" />
        <figcaption>D</figcaption>
      </figure>
    </main>
  </body>
</html>
